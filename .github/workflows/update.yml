name: Actualizar Dashboard McKinsey-Jamar

on:
  workflow_dispatch:          # Llamada externa (cron-job.org)
  schedule:
    - cron: '30 14 * * *'    # 9:30 AM Colombia (UTC-5) todos los días
    - cron: '30 16 * * *'    # 11:30 AM Colombia (UTC-5) todos los días

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar actualización
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          GH_PAT:     ${{ secrets.GH_PAT }}
        run: python update_dashboard.py

      - name: Notificar resultado
        if: always()
        run: |
          echo "✅ Dashboard actualizado: $(date -u '+%Y-%m-%d %H:%M UTC')"
